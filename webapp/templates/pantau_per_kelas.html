<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pantau Kelas {{ kelas_target }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-badge { font-size: 1.2rem; padding: 10px 20px; border-radius: 50px; }
        .card-siswa { border-left: 8px solid; transition: 0.3s; }
    </style>
</head>
<body class="bg-dark text-white">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="display-4 fw-bold text-primary">PANTAU KELAS {{ kelas_target }}</h1>
                <p class="text-secondary" id="live-clock"></p>
            </div>
            <div class="text-end">
                <span class="badge bg-danger pulse mb-2">LIVE</span>
                <p class="small text-muted">Auto-refresh setiap 5 detik</p>
            </div>
        </div>

        <div id="container-pantau" class="row g-4">
            </div>
    </div>

    <script>
        const KELAS = "{{ kelas_target }}";

        function updatePantau() {
            fetch('/api/pantau_live/' + KELAS)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.length === 0) {
                        html = '<div class="col-12 text-center mt-5"><h3 class="text-muted">Semua siswa berada di dalam kelas.</h3></div>';
                    } else {
                        data.forEach(item => {
                            let color = item.status === 'SEDANG_KELUAR' ? 'border-warning' : 'border-success';
                            let bgStatus = item.status === 'SEDANG_KELUAR' ? 'bg-warning text-dark' : 'bg-success text-white';
                            let icon = item.status === 'SEDANG_KELUAR' ? 'fa-running' : 'fa-door-open';

                            html += `
                            <div class="col-md-6 col-lg-4">
                                <div class="card bg-secondary text-white card-siswa ${color} shadow">
                                    <div class="card-body">
                                        <h4 class="fw-bold mb-1">${item.nama_siswa}</h4>
                                        <p class="mb-3 text-info">${item.jenis_izin} | ${item.kode_token}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="badge status-badge ${bgStatus}">
                                                <i class="fas ${icon} me-2"></i>${item.status}
                                            </span>
                                            <small class="text-light opacity-50">${item.waktu_dibuat.split(' ')[1]}</small>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                        });
                    }
                    document.getElementById('container-pantau').innerHTML = html;
                });
        }

        setInterval(updatePantau, 5000);
        updatePantau();

        // Jam Digital
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleString('id-ID');
        }, 1000);
    </script>
</body>
</html>
