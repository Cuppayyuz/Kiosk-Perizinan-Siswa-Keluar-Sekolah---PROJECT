<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pantau Kelas {{ kelas_target }} - Smart Exit</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Noto Serif', 'serif'],
                    },
                    colors: {
                        academic: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            text: '#334155',
                            heading: '#0f172a',
                            primary: '#1e3a8a',
                            primaryHover: '#1e40af',
                            border: '#cbd5e1'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-academic-bg font-sans text-academic-text antialiased min-h-screen">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b-2 border-academic-border pb-6 gap-6">
            
            <div>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">Pemantauan Presensi Keluar</p>
                <h1 class="text-4xl md:text-5xl font-serif font-bold text-academic-heading tracking-tight mb-2">
                    Kelas <span class="text-academic-primary">{{ kelas_target }}</span>
                </h1>
                <p class="text-slate-600 font-medium flex items-center bg-white px-3 py-1.5 rounded-sm border border-slate-200 shadow-sm inline-flex">
                    <i class="fas fa-clock text-academic-primary mr-2 animate-pulse"></i>
                    <span id="live-clock" class="font-mono tracking-wide">Memuat waktu...</span>
                </p>
            </div>
            
            <div class="bg-white p-4 border border-academic-border shadow-sm rounded-sm flex flex-col gap-3 min-w-[250px]">
                <div class="flex items-center justify-between">
                    <label for="filter-tanggal" class="text-xs font-bold text-academic-heading uppercase tracking-wider">
                        <i class="fas fa-calendar-day text-academic-primary mr-1"></i> Tanggal
                    </label>
                    <input type="date" id="filter-tanggal" class="form-control text-sm font-semibold text-slate-700 bg-slate-50 border border-slate-200 px-2 py-1 focus:outline-none focus:border-academic-primary rounded-sm cursor-pointer" onchange="updatePantau()">
                </div>
                
                <div class="flex items-center justify-between border-t border-slate-100 pt-3">
                    <span class="text-xs text-slate-500 font-medium">Status Koneksi:</span>
                    <div class="flex items-center">
                        <span class="flex h-3 w-3 relative mr-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                        </span>
                        <span class="text-xs font-bold text-red-600 tracking-wider">LIVE SINKRON</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="container-pantau" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12">
                <i class="fas fa-circle-notch fa-spin text-4xl text-slate-300 mb-4"></i>
                <p class="text-slate-500 font-medium">Menghubungkan ke pangkalan data...</p>
            </div>
        </div>
    </div>

    <script>
        const KELAS = "{{ kelas_target }}";

        // 1. Set Tanggal Hari Ini Saat Halaman Dibuka
        document.addEventListener('DOMContentLoaded', () => {
            // Menyesuaikan zona waktu lokal (WIB)
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            
            document.getElementById('filter-tanggal').value = `${year}-${month}-${day}`;
            updatePantau();
        });

        // 2. Fungsi Ambil Data dari API
        function updatePantau() {
            const tanggalPilih = document.getElementById('filter-tanggal').value;
            
            fetch(`/api/pantau_live/${KELAS}?tanggal=${tanggalPilih}`)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.length === 0) {
                        html = `
                        <div class="col-span-full flex flex-col items-center justify-center text-center mt-10 py-16 border-2 border-dashed border-slate-300 bg-white rounded-sm">
                            <i class="fas fa-folder-open text-5xl text-slate-300 mb-4"></i>
                            <h3 class="text-xl font-serif font-bold text-slate-600 mb-1">Nihil Pergerakan</h3>
                            <p class="text-sm text-slate-400">Tidak ada token izin yang diterbitkan untuk kelas ini pada tanggal terpilih.</p>
                        </div>`;
                    } else {
                        data.forEach(item => {
                            // Konfigurasi Warna Berdasarkan Status
                            let borderColor = 'border-l-slate-400';
                            let badgeClass = 'bg-slate-50 text-slate-600 border border-slate-200';
                            let iconStatus = '<i class="fas fa-clock mr-1"></i>';
                            
                            if (item.status === 'SEDANG_KELUAR') { 
                                borderColor = 'border-l-amber-500'; 
                                badgeClass = 'bg-amber-50 text-amber-700 border border-amber-200';
                                iconStatus = '<i class="fas fa-running mr-1"></i>';
                            } else if (item.status === 'KEMBALI') { 
                                borderColor = 'border-l-emerald-500'; 
                                badgeClass = 'bg-emerald-50 text-emerald-700 border border-emerald-200';
                                iconStatus = '<i class="fas fa-building mr-1"></i>';
                            } else if (item.status === 'SELESAI') { 
                                borderColor = 'border-l-academic-primary'; 
                                badgeClass = 'bg-blue-50 text-academic-primary border border-blue-200';
                                iconStatus = '<i class="fas fa-check-double mr-1"></i>';
                            }

                            // Logika Waktu
                            let infoWaktuHtml = '';
                            const jamKeluar = item.jam_keluar || '--:--';
                            const jamKembali = item.jam_kembali || '--:--';

                            if (item.jenis_izin === 'SAKIT' || item.jenis_izin === 'DISPEN') {
                                infoWaktuHtml = `
                                    <div class="flex justify-between items-center py-1">
                                        <span class="text-xs text-slate-500 font-medium">Waktu Kepulangan:</span>
                                        <span class="text-sm font-mono font-bold text-academic-heading">${jamKeluar}</span>
                                    </div>`;
                            } else {
                                infoWaktuHtml = `
                                    <div class="flex justify-between items-center py-1 border-b border-slate-200/60 mb-1">
                                        <span class="text-xs text-slate-500 font-medium">Jam Keluar:</span>
                                        <span class="text-sm font-mono font-bold text-academic-heading">${jamKeluar}</span>
                                    </div>
                                    <div class="flex justify-between items-center py-1">
                                        <span class="text-xs text-slate-500 font-medium">Jam Kembali:</span>
                                        <span class="text-sm font-mono font-bold text-academic-heading">${jamKembali}</span>
                                    </div>`;
                            }

                            html += `
                            <div class="bg-white border border-academic-border border-l-4 ${borderColor} shadow-sm hover:shadow-md transition-shadow relative flex flex-col h-full rounded-sm overflow-hidden">
                                <div class="p-5 flex-grow">
                                    <div class="flex justify-between items-start mb-3 gap-2">
                                        <h4 class="font-bold text-academic-heading truncate flex-grow" title="${item.nama_siswa}">${item.nama_siswa}</h4>
                                    </div>
                                    
                                    <div class="inline-flex items-center px-2 py-0.5 rounded-sm bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-widest mb-4">
                                        <i class="fas fa-tag mr-1.5"></i> ${item.jenis_izin}
                                    </div>
                                    
                                    <div class="bg-slate-50 border border-slate-100 p-3 rounded-sm">
                                        ${infoWaktuHtml}
                                    </div>
                                </div>
                                
                                <div class="px-5 py-3 border-t border-academic-border bg-slate-50/50">
                                    <div class="w-full text-center px-3 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${badgeClass}">
                                        ${iconStatus} ${item.status}
                                    </div>
                                </div>
                            </div>`;
                        });
                    }
                    
                    const container = document.getElementById('container-pantau');
                    // Cegah re-render jika DOM tidak berubah untuk menghindari kedipan (flickering)
                    if(container.innerHTML !== html) {
                        container.innerHTML = html;
                    }
                })
                .catch(err => console.error("Error API Sinkronisasi:", err));
        }

        // 3. Auto-Refresh Data (Setiap 5 Detik)
        setInterval(updatePantau, 5000);

        // 4. Jam Digital Presisi
        setInterval(() => {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('live-clock').innerText = now.toLocaleDateString('id-ID', options) + ' WIB';
        }, 1000);
    </script>
</body>
</html>
