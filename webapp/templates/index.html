<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Exit - Sistem Perizinan Sekolah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero-section {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 4rem 2rem;
            border-top: 5px solid #0d6efd;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #0d6efd;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center hero-section">
            <div class="icon-box">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="fw-bold mb-3">SMART EXIT KIOSK</h1>
            <p class="text-muted mb-5 lead">Sistem Informasi Manajemen Perizinan Keluar Masuk Siswa Terintegrasi Barcode & RFID.</p>
            
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="/login" class="btn btn-primary btn-lg px-4 gap-3 shadow-sm">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Masuk Sistem (Login)
                </a>
                <a href="#" class="btn btn-outline-secondary btn-lg px-4" onclick="alert('Silakan menuju layar Kiosk di pos Satpam untuk memindai kartu.')">
                    <i class="fa-solid fa-id-card me-2"></i> Mode Kiosk (Siswa)
                </a>
            </div>
            
            <div class="mt-5 text-muted small">
                &copy; 2026 Tim IT Sekolah. All rights reserved.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
