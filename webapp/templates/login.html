<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Guru - Smart Exit</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-700 min-h-screen flex items-center justify-center font-sans">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl hover:scale-[1.01] transition-transform duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Login</h1>
            <p class="text-md font-bold text-gray-500">untuk masuk ke dashboard</p>
        </div>

        {% if msg %}
        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm" role="alert">
            <p class="font-bold">Gagal Masuk</p>
            <p>{{ msg }}</p>
        </div>
        {% endif %}

        <form action="/" method="POST" class="space-y-6">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="Masukkan username..." required>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 ml-1">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="Masukkan password..." required>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95">
                MASUK SEKARANG
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-300">
            &copy; 2026 Smart Exit System
        </div>
    </div>

</body>
</html>
