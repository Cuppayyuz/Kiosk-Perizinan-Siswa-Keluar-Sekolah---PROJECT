    <script>
        function togglePassword(btn) {
            // Mencari kotak input yang letaknya persis di sebelah/sebelum tombol ikon mata
            let input = btn.previousElementSibling;
            let icon = btn.querySelector('i');

            if (input.type === "password") {
                input.type = "text"; // Tampilkan teks
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash"); // Ganti ikon mata dicoret
            } else {
                input.type = "password"; // Sembunyikan teks
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye"); // Ganti ikon mata terbuka
            }
        }
    </script>
